apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
spec:
  replicas: 1
  selector: { matchLabels: { app: qdrant } }
  template:
    metadata:
      labels: { app: qdrant }
      annotations:
        {{- if .Values.linkerd.enabled }}
        linkerd.io/inject: enabled
        {{- end }}
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.0
          ports: [ { containerPort: 6333 } ]
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
      volumes:
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  selector: { app: qdrant }
  ports: [ { port: 6333, targetPort: 6333 } ]
