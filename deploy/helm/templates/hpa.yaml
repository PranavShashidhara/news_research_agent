{{- if .Values.hpa.agent }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent
  minReplicas: {{ .Values.hpa.agent.minReplicas }}
  maxReplicas: {{ .Values.hpa.agent.maxReplicas }}
  metrics:
    - type: Pods
      pods:
        metric:
          name: inflight_requests
        target:
          type: AverageValue
          averageValue: "{{ .Values.hpa.agent.targetInFlight }}"
{{- end }}
