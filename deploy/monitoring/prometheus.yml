global:
  scrape_interval: 10s
scrape_configs:
  - job_name: orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8000"]

  - job_name: retrieval
    metrics_path: /metrics
    static_configs:
      - targets: ["retrieval:8000"]

  - job_name: agent
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:8000"]

  - job_name: evaluation
    metrics_path: /metrics
    static_configs:
      - targets: ["evaluation:8000"]
